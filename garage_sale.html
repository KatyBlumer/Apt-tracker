<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PH Garage Sales 6/13–6/14</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    /* ============================================================
       Layout
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }
    #map { position: absolute; inset: 0; }

    /* ============================================================
       Controls panel (floating top-left)
    ============================================================ */
    #controls {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.22);
      width: 280px;
      max-height: calc(100vh - 24px);
      display: flex;
      flex-direction: column;
    }

    #controls-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #1e3a5f;
      color: white;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      user-select: none;
    }

    #controls-header h2 { font-size: 14px; font-weight: 700; margin: 0; }
    #controls-toggle { background: none; border: none; color: white; font-size: 16px; cursor: pointer; padding: 0; }

    #controls-body {
      overflow-y: auto;
      padding: 12px 14px;
    }
    #controls-body.hidden { display: none; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 8px 0 5px;
    }

    /* Category chips */
    #cat-filters { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 2px; }

    .cat-chip {
      padding: 3px 9px;
      border-radius: 12px;
      border: 1.5px solid #cbd5e1;
      background: white;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
      user-select: none;
      font-family: inherit;
    }
    .cat-chip.active { background: #1e3a5f; border-color: #1e3a5f; color: white; }
    .cat-chip:hover:not(.active) { border-color: #64748b; }

    /* Legend */
    .legend { display: flex; flex-direction: column; gap: 4px; }
    .legend-row { display: flex; align-items: center; gap: 7px; font-size: 12px; }
    .legend-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.7);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
      flex-shrink: 0;
    }

    /* Misc controls */
    .ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .ctrl-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }

    /* ============================================================
       Pins
    ============================================================ */
    .pin {
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7px;
      color: rgba(255,255,255,0.95);
      font-weight: 900;
      cursor: pointer;
      line-height: 1;
      transition: transform 0.12s;
    }
    .pin:hover { transform: scale(1.25); }

    /* ============================================================
       Popup
    ============================================================ */
    .sale-popup { font-size: 13px; min-width: 260px; max-width: 320px; }

    .popup-address { font-weight: 700; font-size: 15px; margin-bottom: 3px; }

    .popup-cats { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .popup-cat { padding: 2px 8px; background: #e0f2fe; color: #0c4a6e; border-radius: 10px; font-size: 11px; }

    /* Hours section — blue-tinted */
    .popup-hours-section {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 8px;
    }
    .popup-section-label { font-size: 11px; font-weight: 700; margin-bottom: 5px; }
    .popup-hours-section .popup-section-label { color: #1e40af; }
    .popup-time-row { display: flex; align-items: center; gap: 6px; }
    .time-input {
      border: 1px solid #93c5fd; border-radius: 4px;
      padding: 3px 5px; font-size: 12px; font-family: inherit;
      background: white; flex: 1; min-width: 0;
    }
    .time-input:focus { outline: 2px solid #3b82f6; border-color: transparent; }
    .btn-clear-hours {
      background: none; border: none; cursor: pointer;
      color: #6b7280; font-size: 14px; padding: 2px 4px; line-height: 1;
    }
    .btn-clear-hours:hover { color: #ef4444; }

    /* Notes section — yellow-tinted */
    .popup-notes-section {
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 8px;
    }
    .popup-notes-section .popup-section-label { color: #92400e; }
    .popup-notes {
      width: 100%; min-height: 44px;
      border: 1px solid #fcd34d; border-radius: 4px;
      padding: 4px 6px; font-size: 12px;
      resize: vertical; font-family: inherit; background: white;
    }

    .popup-divider { border: none; border-top: 1px solid #e5e7eb; margin: 8px 0; }

    .popup-text {
      color: #374151; font-size: 12px; line-height: 1.5;
      max-height: 130px; overflow-y: auto;
      white-space: pre-wrap; margin-bottom: 10px;
    }

    /* Action buttons */
    .popup-actions { display: flex; gap: 5px; flex-wrap: wrap; }

    .btn {
      padding: 5px 9px; border-radius: 5px; border: 1.5px solid;
      cursor: pointer; font-size: 12px; font-weight: 600;
      font-family: inherit; transition: opacity 0.12s;
    }
    .btn:hover  { opacity: 0.82; }
    .btn:active { transform: scale(0.96); }
    .btn.current { box-shadow: 0 0 0 2px rgba(0,0,0,0.25); }

    .btn-star1   { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
    .btn-star2   { background: #ffedd5; border-color: #f97316; color: #7c2d12; }
    .btn-star3   { background: #fee2e2; border-color: #ef4444; color: #7f1d1d; }
    .btn-neutral { background: #f3f4f6; border-color: #9ca3af; color: #374151; }
    .btn-remove  { background: #f9fafb; border-color: #6b7280; color: #374151; }
    .btn-restore { background: #dcfce7; border-color: #22c55e; color: #14532d; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="controls">
    <div id="controls-header" onclick="toggleControls()">
      <h2>🏷️ PH Garage Sales 6/13–6/14</h2>
      <button id="controls-toggle" aria-label="Collapse">▲</button>
    </div>
    <div id="controls-body">
      <div class="ctrl-row">
        <label>
          <input type="checkbox" id="show-removed" onchange="onShowRemovedChange()">
          Show removed
        </label>
        <button class="btn btn-neutral" style="margin-left:auto;font-size:11px" onclick="clearAllStars()">Clear stars</button>
      </div>

      <div class="section-label">Open at time</div>
      <div class="ctrl-row" style="flex-wrap:wrap;gap:6px">
        <input type="time" id="time-filter" onchange="onTimeFilterChange()"
               style="border:1px solid #cbd5e1;border-radius:4px;padding:3px 6px;font-size:12px;font-family:inherit">
        <button class="btn btn-neutral" style="font-size:11px;padding:4px 7px" onclick="clearTimeFilter()">✕ Clear</button>
        <label style="font-size:11px;width:100%">
          <input type="checkbox" id="show-no-hours" checked onchange="onTimeFilterChange()">
          Show if hours unknown
        </label>
      </div>

      <div class="section-label">Filter by category</div>
      <div id="cat-filters"></div>

      <div class="section-label" style="margin-top:10px">Legend</div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <!-- Firebase: initializes window.GS_FB and fires "gs-fb-ready" -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const db = getFirestore(initializeApp({
      apiKey:            "AIzaSyBQE_jALldqxkmkk01oLwyfiDAlj5HnMS0",
      authDomain:        "apartment-hunt-2026.firebaseapp.com",
      projectId:         "apartment-hunt-2026",
      storageBucket:     "apartment-hunt-2026.firebasestorage.app",
      messagingSenderId: "636926285570",
      appId:             "1:636926285570:web:07bb863c19a7f8a4c5541b",
    }));

    const COLL = collection(db, "garage_sale_ph", "2025", "entries");

    window.GS_FB = {
      subscribe(cb) {
        return onSnapshot(COLL, snap => {
          const entries = {};
          snap.forEach(d => { entries[d.id] = d.data(); });
          cb(entries);
        }, err => console.error("Firestore error:", err));
      },
      async save(id, data) {
        await setDoc(doc(COLL, id), data);
      },
    };
    window.dispatchEvent(new Event("gs-fb-ready"));
  </script>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
  "use strict";

  // ============================================================
  // CONFIG — edit here to change behavior globally
  // ============================================================
  const DATA_URL   = "garage_sales/sales_data.json";
  const STATE_KEY  = "gs_ph_2025";
  const MAP_CENTER = [37.948, -122.060]; // Pleasant Hill center
  const MAP_ZOOM   = 13;

  // Star levels: single source of truth for colors, labels, sizes
  const STAR_LEVELS = [
    { stars: 1, label: "Good",     color: "#f59e0b", size: 14 },
    { stars: 2, label: "Great",    color: "#f97316", size: 17 },
    { stars: 3, label: "Must-see", color: "#ef4444", size: 21 },
  ];
  const DEFAULT_PIN      = { color: "#3b82f6", size: 12 };
  const DEFAULT_PIN_SLIM = { color: "#3b82f6", size: 7  }; // listings with no description text
  const REMOVED_PIN      = { color: "#9ca3af", size: 8  };
  const TIMED_BORDER   = "2px solid #1e293b"; // dark border = has hours info
  const UNTIMED_BORDER = "2px solid rgba(255,255,255,0.85)";

  // ============================================================
  // STATE — persisted to localStorage + Firebase
  // Shape: { [saleId]: { stars: 0–3, removed: bool, notes: string,
  //                      hoursOverride: {start, end, raw} | null } }
  // ============================================================
  let state = {};

  function loadState() {
    try { state = JSON.parse(localStorage.getItem(STATE_KEY) || "{}"); }
    catch { state = {}; }
  }

  function saveState() {
    localStorage.setItem(STATE_KEY, JSON.stringify(state));
  }

  function getSaleState(id) {
    return state[id] || { stars: 0, removed: false, notes: "", hoursOverride: null };
  }

  function updateSaleState(id, patch) {
    state[id] = { ...getSaleState(id), ...patch };
    saveState();
    fbSave(id);
    refreshMarker(id);
    refreshPopup(id);
  }

  // ============================================================
  // FIREBASE SYNC
  // ============================================================
  let notesSaveTimer = null;
  let hoursSaveTimer = null;

  function fbSave(id) {
    if (window.GS_FB) GS_FB.save(id, getSaleState(id));
  }

  function initFirebase() {
    GS_FB.subscribe(entries => {
      for (const [id, data] of Object.entries(entries)) state[id] = data;
      saveState();
      for (const id of Object.keys(markers)) refreshMarker(id);
      if (activeSaleId) refreshPopup(activeSaleId);
    });
  }

  window.addEventListener("gs-fb-ready", initFirebase);
  if (window.GS_FB) initFirebase();

  // ============================================================
  // HOURS HELPERS
  // ============================================================

  // Returns the hours to use for a sale: user override takes precedence.
  function effectiveHours(id) {
    const s = getSaleState(id);
    if (s.hoursOverride && (s.hoursOverride.start || s.hoursOverride.end)) return s.hoursOverride;
    return salesById[id]?.hours || null;
  }

  // "14:30" → "2:30pm"
  function fmt24(t) {
    if (!t) return "";
    const [h, m] = t.split(":").map(Number);
    const ampm = h >= 12 ? "pm" : "am";
    const h12  = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return m === 0 ? `${h12}${ampm}` : `${h12}:${String(m).padStart(2, "0")}${ampm}`;
  }

  // Build a human-readable raw string from 24h start/end
  function makeRaw(start, end) {
    return [fmt24(start), fmt24(end)].filter(Boolean).join("–");
  }

  // ============================================================
  // FILTERING
  // ============================================================
  let showRemoved  = false;
  let timeFilter   = "";    // "HH:MM" or ""
  let showNoHours  = true;  // when time filter active, include sales with no hours?
  const activeCats = new Set();

  function passesFilter(sale) {
    const s = getSaleState(sale.id);
    if (s.removed && !showRemoved) return false;
    if (activeCats.size > 0 && !(sale.categories || []).some(c => activeCats.has(c))) return false;
    if (timeFilter) {
      const h = effectiveHours(sale.id);
      if (!h || !h.start || !h.end) return showNoHours;
      return h.start <= timeFilter && timeFilter <= h.end;
    }
    return true;
  }

  function applyFilters() {
    for (const [id, marker] of Object.entries(markers)) {
      const sale = salesById[id];
      if (!sale) continue;
      const visible = passesFilter(sale);
      if (visible && !map.hasLayer(marker)) marker.addTo(map);
      if (!visible && map.hasLayer(marker))  marker.remove();
    }
  }

  function onShowRemovedChange() {
    showRemoved = document.getElementById("show-removed").checked;
    applyFilters();
  }

  function onTimeFilterChange() {
    timeFilter  = document.getElementById("time-filter").value;
    showNoHours = document.getElementById("show-no-hours").checked;
    applyFilters();
  }

  function clearTimeFilter() {
    document.getElementById("time-filter").value = "";
    timeFilter = "";
    applyFilters();
  }

  function toggleCategory(cat) {
    if (activeCats.has(cat)) activeCats.delete(cat);
    else activeCats.add(cat);
    document.querySelectorAll(".cat-chip").forEach(el => {
      el.classList.toggle("active", activeCats.has(el.dataset.cat));
    });
    applyFilters();
  }

  // ============================================================
  // MARKER RENDERING
  // ============================================================
  const markers   = {};  // saleId → L.marker
  const salesById = {};  // saleId → sale object

  function pinStyle(id) {
    const s = getSaleState(id);
    if (s.removed) return REMOVED_PIN;
    const starLevel = STAR_LEVELS.find(l => l.stars === s.stars);
    if (starLevel) return starLevel;
    const sale = salesById[id];
    return (sale && !sale.text) ? DEFAULT_PIN_SLIM : DEFAULT_PIN;
  }

  function makeIcon(id) {
    const { color, size } = pinStyle(id);
    const s      = getSaleState(id);
    const label  = (!s.removed && s.stars > 0) ? "★".repeat(s.stars) : "";
    const border = effectiveHours(id) ? TIMED_BORDER : UNTIMED_BORDER;
    return L.divIcon({
      html: `<div class="pin" style="width:${size}px;height:${size}px;background:${color};border:${border}">${label}</div>`,
      className:  "",
      iconSize:   [size, size],
      iconAnchor: [size / 2, size / 2],
    });
  }

  function refreshMarker(id) {
    const marker = markers[id];
    if (marker) {
      marker.setIcon(makeIcon(id));
      applyFilters();
    }
  }

  // ============================================================
  // POPUP CONTENT
  // ============================================================
  let activeSaleId = null;

  function makePopupContent(sale) {
    const s  = getSaleState(sale.id);
    const eh = effectiveHours(sale.id);
    const hasOverride = !!s.hoursOverride && (s.hoursOverride.start || s.hoursOverride.end);

    const startVal = eh ? (eh.start || "") : "";
    const endVal   = eh ? (eh.end   || "") : "";

    const catBadges = (sale.categories || [])
      .map(c => `<span class="popup-cat">${esc(c)}</span>`)
      .join("");

    const starBtns = STAR_LEVELS
      .map(l => `<button class="btn btn-star${l.stars}${s.stars === l.stars ? " current" : ""}"
                         onclick="window.setSaleStars('${sale.id}', ${s.stars === l.stars ? 0 : l.stars})">
                   ${"★".repeat(l.stars)} ${esc(l.label)}
                 </button>`)
      .join("");

    const actionBtn = s.removed
      ? `<button class="btn btn-restore" onclick="window.setSaleRemoved('${sale.id}', false)">↩ Restore</button>`
      : `<button class="btn btn-remove"  onclick="window.setSaleRemoved('${sale.id}', true)">✕ Remove</button>`;

    return `
      <div class="sale-popup">
        <div class="popup-address">${esc(sale.address)}</div>
        <div class="popup-cats">${catBadges}</div>

        <div class="popup-hours-section">
          <div class="popup-section-label">🕐 Hours${hasOverride ? " (edited)" : ""}</div>
          <div class="popup-time-row">
            <input type="time" class="time-input" value="${esc(startVal)}"
                   oninput="window.setSaleHours('${sale.id}', 'start', this.value)">
            <span style="color:#6b7280;flex-shrink:0">–</span>
            <input type="time" class="time-input" value="${esc(endVal)}"
                   oninput="window.setSaleHours('${sale.id}', 'end', this.value)">
            ${hasOverride
              ? `<button class="btn-clear-hours" title="Clear edit" onclick="window.clearSaleHours('${sale.id}')">↩</button>`
              : ""}
          </div>
        </div>

        <div class="popup-notes-section">
          <div class="popup-section-label">My notes</div>
          <textarea class="popup-notes"
            oninput="window.setSaleNotes('${sale.id}', this.value)"
            placeholder="Add notes…">${esc(s.notes || "")}</textarea>
        </div>

        <hr class="popup-divider">
        <div class="popup-text">${esc(sale.text || "")}</div>
        <div class="popup-actions">
          ${starBtns}
          ${actionBtn}
        </div>
      </div>`;
  }

  function refreshPopup(id) {
    const marker = markers[id];
    const sale   = salesById[id];
    if (marker && sale && marker.isPopupOpen()) {
      marker.setPopupContent(makePopupContent(sale));
    }
  }

  // ============================================================
  // POPUP ACTION HANDLERS (attached to window so popup HTML can call them)
  // ============================================================
  window.setSaleStars   = (id, n)   => updateSaleState(id, { stars: n });
  window.setSaleRemoved = (id, val) => updateSaleState(id, { removed: val });

  // Notes and hours: save state + debounced Firebase write, but NO popup
  // re-render — re-rendering replaces the DOM element and kills focus.
  window.setSaleNotes = (id, v) => {
    state[id] = { ...getSaleState(id), notes: v };
    saveState();
    clearTimeout(notesSaveTimer);
    notesSaveTimer = setTimeout(() => fbSave(id), 800);
  };

  window.setSaleHours = (id, field, v) => {
    const cur     = getSaleState(id).hoursOverride || { start: "", end: "" };
    const updated = { ...cur, [field]: v };
    updated.raw   = makeRaw(updated.start, updated.end);
    state[id] = { ...getSaleState(id), hoursOverride: updated };
    saveState();
    clearTimeout(hoursSaveTimer);
    hoursSaveTimer = setTimeout(() => fbSave(id), 800);
    refreshMarker(id); // update border color immediately
    applyFilters();    // re-evaluate time filter immediately
  };

  window.clearSaleHours = (id) => {
    updateSaleState(id, { hoursOverride: null });
  };

  // ============================================================
  // CONTROLS UI HANDLERS
  // ============================================================
  window.toggleControls = function() {
    const body = document.getElementById("controls-body");
    const btn  = document.getElementById("controls-toggle");
    body.classList.toggle("hidden");
    btn.textContent = body.classList.contains("hidden") ? "▼" : "▲";
  };

  window.onShowRemovedChange = onShowRemovedChange;
  window.onTimeFilterChange  = onTimeFilterChange;
  window.clearTimeFilter     = clearTimeFilter;
  window.toggleCategory      = toggleCategory;

  window.clearAllStars = function() {
    if (!confirm("Clear all star ratings?")) return;
    for (const id of Object.keys(state)) {
      if (state[id].stars) {
        state[id] = { ...state[id], stars: 0 };
        refreshMarker(id);
      }
    }
    saveState();
    if (activeSaleId) refreshPopup(activeSaleId);
  };

  // ============================================================
  // UTILITY
  // ============================================================
  function esc(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // ============================================================
  // INIT
  // ============================================================
  let map;

  async function init() {
    loadState();

    map = L.map("map").setView(MAP_CENTER, MAP_ZOOM);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors",
      maxZoom: 19,
    }).addTo(map);

    const sales = await fetch(DATA_URL).then(r => r.json());

    for (const sale of sales) salesById[sale.id] = sale;

    // Build category chips from all categories present in the data
    const allCats = new Set();
    for (const sale of sales) for (const c of (sale.categories || [])) allCats.add(c);

    const catContainer = document.getElementById("cat-filters");
    [...allCats].sort().forEach(cat => {
      const chip = document.createElement("button");
      chip.className   = "cat-chip";
      chip.dataset.cat = cat;
      chip.textContent = cat;
      chip.onclick     = () => toggleCategory(cat);
      catContainer.appendChild(chip);
    });

    // Build legend from STAR_LEVELS config + defaults
    const legendRows = [
      ...STAR_LEVELS.map(l => ({ color: l.color, text: `${"★".repeat(l.stars)} ${l.label}` })),
      { color: DEFAULT_PIN.color,      text: "Not yet rated" },
      { color: DEFAULT_PIN_SLIM.color, text: "Not yet rated (no description)", slim: true },
      { color: REMOVED_PIN.color,      text: "Removed" },
      { color: DEFAULT_PIN.color,      text: "Dark border = has listed hours", border: TIMED_BORDER },
    ];
    document.getElementById("legend").innerHTML = legendRows
      .map(r => {
        const size   = r.slim ? "7px" : "12px";
        const border = r.border || UNTIMED_BORDER;
        return `<div class="legend-row">
                  <div class="legend-dot" style="background:${r.color};width:${size};height:${size};border:${border}"></div>
                  <span>${esc(r.text)}</span>
                </div>`;
      })
      .join("");

    // Create markers for every geocoded sale
    for (const sale of sales) {
      if (!sale.lat || !sale.lng) continue;

      const marker = L.marker([sale.lat, sale.lng], {
        icon:  makeIcon(sale.id),
        title: sale.address,
      });

      marker.bindPopup(() => makePopupContent(sale), {
        maxWidth: 340,
        minWidth: 260,
      });

      marker.on("popupopen",  () => { activeSaleId = sale.id; });
      marker.on("popupclose", () => { if (activeSaleId === sale.id) activeSaleId = null; });

      markers[sale.id] = marker;
    }

    applyFilters();
  }

  init().catch(err => {
    document.body.innerHTML = `<p style="padding:20px;color:red">
      Failed to load sale data: ${err.message}<br>
      Make sure <code>garage_sales/sales_data.json</code> exists.
    </p>`;
  });
  </script>
</body>
</html>
